app = "badtzbot-pulselat"
primary_region = "mia"

[build]

[env]
  TZ = "America/Puerto_Rico"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # El bot de voz debe estar SIEMPRE encendido (no apagar por inactividad).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "badtz_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
